  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-titulo">
    <section class="lightbox-conteudo">
      <img class="lightbox-img img-oficial" id="lightbox-img" src="" alt="">
      <h2 id="lightbox-titulo"></h2>
      <button type="button" class="lightbox-fechar" id="fechar-lightbox">Fechar</button>
    </section>
  </div>

  <footer class="rodape-fenda">
    <p>© 2026 Fenda do Biquíni — <a href="contato.html">Contato</a></p>
    <p class="credito-imagens">Imagens oficiais © Nickelodeon / NickRewind — <a href="https://commons.wikimedia.org/wiki/Category:SpongeBob_SquarePants" target="_blank" rel="noopener">Wikimedia Commons</a> (CC BY 3.0).</p>
  </footer>

  <script>
    (function () {
      const lightbox = document.getElementById('lightbox');
      const imgEl = document.getElementById('lightbox-img');
      const tituloEl = document.getElementById('lightbox-titulo');
      const fecharBtn = document.getElementById('fechar-lightbox');

      document.querySelectorAll('.item-galeria').forEach(function (item) {
        item.addEventListener('click', function () {
          imgEl.src = item.getAttribute('data-imagem');
          imgEl.alt = item.getAttribute('data-titulo');
          tituloEl.textContent = item.getAttribute('data-titulo');
          lightbox.classList.add('aberto');
        });
      });

      function fechar() {
        lightbox.classList.remove('aberto');
      }

      fecharBtn.addEventListener('click', fechar);
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) fechar();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') fechar();
      });
    })();
  </script>
